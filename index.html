<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Japanese Reader Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-[#F9F7E8] text-[#4E342E] font-sans">
    <header class="max-w-4xl mx-auto mb-8">
        <h1 class="text-2xl font-bold">Japanese Reader Lite (划词查词版)</h1>
    </header>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <main class="md:col-span-2">
            <textarea id="input" class="w-full p-6 border-2 border-slate-200 rounded-2xl shadow-sm h-[400px]" placeholder="在此粘贴日语文章..."></textarea>
            <p class="text-xs text-gray-400 mt-2">提示：粘贴文章后，双击或鼠标划取想要查询的单词。</p>
            <div id="displayArea" class="w-full p-6 border-2 border-slate-200 rounded-2xl bg-white mt-4 h-[200px] overflow-y-auto whitespace-pre-wrap"></div>
        </main>
        
        <aside class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[600px]">
            <h2 class="font-bold text-lg mb-4">📖 生词本</h2>
            <div id="vocab-list" class="flex-1 overflow-y-auto space-y-3 text-sm"></div>
            <button onclick="clearAll()" class="mt-4 w-full text-red-400 text-xs">全部清空</button>
        </aside>
    </div>

    <script>
        const input = document.getElementById('input');
        const display = document.getElementById('displayArea');

        // 将输入框内容同步到展示区
        input.oninput = () => { display.textContent = input.value; };

        // 监听双击或划词触发
        display.onmouseup = async () => {
            const selectedText = window.getSelection().toString().trim();
            if (selectedText.length > 0) {
                // 自动触发查词面板
                lookupWord(selectedText);
            }
        };

        async function lookupWord(word) {
            // 这里你可以直接弹窗或者用一个简单的 confirm 来处理，为了稳定我们简化为直接存入
            const confirmSave = confirm(`查词: ${word}\n是否存入生词本？`);
            if (confirmSave) {
                // 获取简单信息(假名/翻译)
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=zh-CN&dt=t&q=${encodeURI(word)}`);
                const data = await res.json();
                const cn = data[0][0][0];
                saveWord(word, cn);
            }
        }

        function saveWord(word, cn) {
            let list = JSON.parse(localStorage.getItem('myVocab') || '[]');
            if(!list.find(item => item.word === word)) {
                list.push({ word, cn });
                localStorage.setItem('myVocab', JSON.stringify(list));
                renderList();
            }
        }

        function renderList() {
            const list = document.getElementById('vocab-list');
            const items = JSON.parse(localStorage.getItem('myVocab') || '[]');
            list.innerHTML = items.map(i => `
                <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-green-700 flex justify-between">
                    <div><div class="font-bold">${i.word}</div><div class="text-xs text-gray-600">${i.cn}</div></div>
                </div>
            `).join('');
        }

        function clearAll() { localStorage.removeItem('myVocab'); renderList(); }
        renderList();
    </script>
</body>
</html>
