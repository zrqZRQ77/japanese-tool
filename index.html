<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Japanese Reading Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F9F7E8; color: #4E342E; }
        .word-active { background-color: #FFF9C4 !important; border-bottom: 2px solid #558B2F; }
        .avocado-btn { background-color: #558B2F; transition: 0.3s; }
        .avocado-btn:hover { background-color: #3E6722; }
    </style>
</head>
<body class="p-6 md:p-10 font-sans">
    <header class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold flex items-center gap-2">
            <img src="avocadologo.png" class="w-10 h-10"> Japanese Reading Helper
        </h1>
    </header>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <main class="md:col-span-2 space-y-6">
            <textarea id="input" class="w-full p-6 border-2 border-slate-200 rounded-2xl shadow-sm outline-none focus:border-green-700 text-base" rows="6" placeholder="粘贴日语文本..."></textarea>
            <button id="btn" class="avocado-btn w-full text-white py-4 rounded-xl font-bold text-lg">开始处理</button>
            <div id="output" class="w-full p-6 border-2 border-slate-200 rounded-2xl shadow-sm bg-white text-slate-700 text-base leading-relaxed min-h-[200px]">输入文本并点击处理...</div>
        </main>
        <aside class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[600px]">
            <h2 class="font-bold text-lg mb-4">📖 生词本 (含上下文)</h2>
            <div id="vocab-list" class="flex-1 overflow-y-auto space-y-3 text-sm"></div>
            <button onclick="clearAll()" class="mt-4 w-full text-red-400 text-xs">全部清空</button>
        </aside>
    </div>

    <script>
        document.getElementById('btn').onclick = () => {
            const text = document.getElementById('input').value;
            const output = document.getElementById('output');
            output.innerHTML = "";
            const words = text.split(/([ \n\r\t,，。！？])/).filter(w => w.trim().length > 0);
            
            words.forEach(w => {
                const span = document.createElement('span');
                span.className = "cursor-pointer p-1 rounded hover:bg-green-100";
                span.textContent = w;
                span.onclick = () => {
                    span.classList.toggle('word-active');
                    if(span.classList.contains('word-active')) saveWord(w, text);
                };
                output.appendChild(span);
            });
        };

        function saveWord(word, context) {
            let list = JSON.parse(localStorage.getItem('myVocab') || '[]');
            if(!list.find(item => item.word === word)) {
                list.push({ word, context: context.substring(0, 50) + "..." });
                localStorage.setItem('myVocab', JSON.stringify(list));
            }
            renderList();
        }

        function renderList() {
            const list = document.getElementById('vocab-list');
            const items = JSON.parse(localStorage.getItem('myVocab') || '[]');
            list.innerHTML = items.map(item => `
                <div class="p-3 bg-slate-50 rounded-lg border-l-4 border-green-700">
                    <a href="https://ejje.weblio.jp/content/${item.word}" target="_blank" class="font-bold text-green-800 hover:underline">${item.word}</a>
                    <div class="text-[10px] text-slate-400 mt-1">${item.context}</div>
                </div>
            `).join('');
        }

        function clearAll() { localStorage.removeItem('myVocab'); renderList(); }
        renderList();
    </script>
</body>
</html>
