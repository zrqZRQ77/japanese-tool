<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NYTRWPS9DM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NYTRWPS9DM');
    </script>

    <title id="siteTitle">Japanese Hub - 日本語学習ワークスペース</title>
    <meta name="description" id="siteDesc" content="Japanese Hub は、効率的な日本語学習プラットフォームです。読解ツール、単語帳、資格試験対策を提供しています。">
    <meta name="keywords" content="Japanese Hub,日本語学習,日本語読解,単語帳,JLPT,日本語資格試験">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F9F7E8; color: #4E342E; font-family: 'Segoe UI', sans-serif; }
        .avocado-card { background: #FFFFFF; border: 1px solid #EBE4DD; box-shadow: 0 10px 15px -3px rgba(85, 139, 47, 0.1); }
        .btn-avocado { background-color: #558B2F; color: white; transition: 0.3s; }
        .btn-avocado:hover { background-color: #3E6722; }
    </style>
</head>
<body class="p-6 md:p-10 flex flex-col min-h-screen">
    <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-8 flex-grow">
        <div class="md:col-span-8 space-y-6">
            <header class="flex justify-between items-center">
                <h1 class="text-3xl font-bold flex items-center gap-3 text-[#558B2F]">
                    <img src="./avocadologo.png" class="w-12 h-12" alt="Logo"> Japanese Hub
                </h1>
                <nav class="space-x-4 text-sm font-bold text-[#558B2F]">
                    <a href="/" class="hover:underline">読解ツール</a>
                    <a href="/about.html" class="hover:underline">運営者情報</a>
                    <a href="#" class="hover:underline opacity-50 cursor-not-allowed">資格試験 (準備中)</a>
                </nav>
            </header>

            <div id="editorMode" class="space-y-4">
                <textarea id="input" class="w-full p-8 rounded-3xl border-none shadow-inner bg-[#F4EDE8] outline-none min-h-[400px] text-lg" placeholder="日本語の文章を貼り付けてください..."></textarea>
                <button id="btnStart" onclick="startReading()" class="btn-avocado w-full py-4 rounded-2xl font-bold text-lg">読み始める</button>
            </div>
            
            <div id="readerMode" class="hidden relative">
                <div id="textDisplay" class="w-full p-10 rounded-3xl avocado-card min-h-[400px] text-lg leading-loose" onmouseup="handleSelection()"></div>
                <button id="btnEdit" onclick="switchToEdit()" class="absolute top-4 right-6 px-4 py-1 bg-gray-100 rounded-lg text-xs hover:bg-gray-200 text-gray-600">編集に戻る</button>
            </div>
        </div>
        
        <aside class="md:col-span-4 flex flex-col gap-6">
            <div class="avocado-card p-6 rounded-3xl h-[450px] flex flex-col">
                <h2 id="vocabTitle" class="font-bold text-lg mb-4 text-[#558B2F]">📖 単語帳</h2>
                <div id="vocab-list" class="flex-1 overflow-y-auto space-y-3"></div>
                <div class="mt-4 flex gap-2">
                    <button id="btnExport" onclick="exportCSV()" class="flex-1 py-3 bg-slate-100 rounded-xl text-sm">エクスポート</button>
                    <button id="btnClear" onclick="clearAll()" class="py-3 px-6 text-red-400 text-sm">クリア</button>
                </div>
            </div>
            <a id="feedbackLink" href="https://h5xjhwnvwx.feishu.cn/share/base/form/shrcnLbIhhb5HsCkhNOJJtBmS7d" target="_blank" class="text-center text-sm text-gray-400 hover:text-[#558B2F]">ご意見・フィードバック</a>
        </aside>
    </main>

    <footer class="mt-12 text-center text-gray-500 text-sm space-y-2">
        <p>© 2026 Japanese Hub. All rights reserved.</p>
        <p>お問い合わせ: <a href="mailto:contact@japanese-hub.com" class="hover:text-[#558B2F] underline">contact@japanese-hub.com</a></p>
    </footer>

    <script>
        function startReading() { const text = document.getElementById('input').value; if(!text) return; document.getElementById('textDisplay').textContent = text; document.getElementById('editorMode').classList.add('hidden'); document.getElementById('readerMode').classList.remove('hidden'); }
        function switchToEdit() { document.getElementById('editorMode').classList.remove('hidden'); document.getElementById('readerMode').classList.add('hidden'); }
        // (其他 JS 函数保持不变...)
    </script>
</body>
</html>
